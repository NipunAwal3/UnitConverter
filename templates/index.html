{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/bootstrap-icons.css' %}">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div style="text-align: center;">
    <img src="{% static 'img/unit-converter.avif'%}" alt="Logo" width="400" height="200">
</div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-arrow-left-right"></i> Unit Converter</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Select Category</label>
                        <select name="category" id="category_select" class="form-select">
                            <option value="length">Length</option>
                            <option value="temp">Temperature</option>
                            <option value="currency">Currency</option>
                        </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Value to Convert</label>
                        <input type="number" name="value" placeholder="0.00" class="form-control" step="any" required>
                        </div>
                        
                       <div class="row g-2 mb-4">
                            <div class="col-5">
                                <select name="unit_from" id="unit_from" class="form-select"></select>
                            </div>
                            <div class="col-2 text-center align-self-center">
                                <i class="bi bi-chevron-right"></i>
                            </div>
                            <div class="col-5">
                                <select name="unit_to" id="unit_to" class="form-select"></select>
                            </div>
                        </div>

                        <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Convert</button>
                        </div>
                    </form>
                </div>

                {% if result is not None %}
                <div class="card-footer bg-light text-center py-3">
                                    <span class="text-muted small">Result</span>
                    <h3 class="text-primary mb-0">{{ result|floatformat:2 }}</h3>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/logic.js' %}"></script>
</body>
</html>
